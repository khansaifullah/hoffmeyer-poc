services:
  - type: web
    name: hoffmeyer-api
    rootDir: backend
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: php -S 0.0.0.0:$PORT -t public
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Hoffmeyer
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
